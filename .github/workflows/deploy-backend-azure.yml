name: Deploy .NET Backend to Azure App Service

on:
  push:
    branches: [ master ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.0.x'

      - name: Restore dependencies
        run: dotnet restore ./ICTVisitorsManagementSystem/ICTVisitorsManagementSystem/ICTVisitorsManagementSystem.csproj

      - name: Publish
        run: |
          dotnet publish ./ICTVisitorsManagementSystem/ICTVisitorsManagementSystem/ICTVisitorsManagementSystem.csproj \
            --configuration Release \
            --output ./publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./publish
